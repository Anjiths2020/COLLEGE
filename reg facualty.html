<html>
    <head>
        <title>FACULTY REGISTRATION</title>
        <style>
            body{
                margin: 0;
                padding: 0;
                font-family: Arial, Helvetica, sans-serif;
                /* background-image:url(reg_fac_back.jpg); */
                /* background: black; */
            }
            *{
                /* outline: 2px solid blue; */
            }
            .registration_form{
                width: 40%;
                display: inline-block;
                box-shadow: 5px #000000;

                /* background-color: #f0f0f0; */
                /* margin-left: 900px; */
            }
            .registration_form input,button{
                display: block;
                margin: 10px auto;
                width: 80%;
                height: 30px;
                font-size: 18px;
                border-radius: 5px;
                border: 1px solid #ccc;
                padding: 0 10px;
                background: transparent;
                box-shadow: 0 0 5px rgba(0,0,0,0.1);

        </style>
    </head>
    <body>
        <div class="whole-reg-fac">
            <!-- <img src="reg fac back.jpg"> -->
            <h1 style="color: black;text-align: center;margin-top: 20px;">FACULTY REGISTRATION</h1>
            <form class="registration_form">
                <input type="text" placeholder="FULL NAME SAME AS AADHAR">
                <br>
                <input type="text" placeholder="EMAIL">
                <br>
                <input type="number" placeholder="MOBILE NUMBER">
                <br>
                <input type="date" placeholder="DOB"><br>
                <input type="password" placeholder="SET PASSWORD"><br>
                <input type="password" placeholder="CONFIRM PASSWORD"><br>
                <button>REGISTER</button>
            </form>
        </div>
    </body>
