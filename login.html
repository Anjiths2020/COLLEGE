<html>
    <head>
        <title>
            LOGIN
        </title>
        <style>
            body, html{
                margin: 0;
                padding: 0;
                /* font-family: Arial, Helvetica, sans-serif; */
            }
            .login{
                align-items: center;
                display: flex;
                justify-content: center;
                height: 100vh;
                /* background: linear-gradient(to bottom, #833AB4,#FD1D1D,#FCB045); */
                /* outline: 2px solid blue; */
            }
            /* *{
                outline: 2px solid red;
            } */
            .login-form{
                width: 450px;
                height: 500px;
                border-radius: 20px;
                box-shadow:0 0 10px black;
                background: transparent;
                /* outline: 2px solid green; */
            }
            .login-form input{
                /* border-radius: 20px; */
                display: block;
                /* background: rgb(207, 149, 149); */
                border: none;
                border-bottom: 2px solid black;
                margin-top: 20px;
                font-size: 20px;
                width: 80%;
                height: 40px;
                /* align-items: center;
                position: absolute; */
            }
            .login-form button{
                width: 80%;
                height: 40px;
                margin-top: 20px;
                font-size: 20px;
                border-radius: 20px;
                border: none;
                background-color: black;
                color: white;
                align-items: center;
            }
            .login-form div{
                margin-left: 60px;
                margin-top: 20px;
                font-size: 20px;
            }
            .login-form h3{
                margin-top: 40px;
                font-size: 30px;
            }
        </style>
    </head>
    <body>
        <div class="login">
            <form class="login-form">
                <h3><center>LOGIN PAGE</center></h3>
                <div>
                    <label>UserName</label>
                    <input type="text" name="login_name" class="login-input"
                    placeholder="Enter your username">
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" class="login-input" placeholder="Enter your password">
                </div>
                <div>
                    <button>LOGIN</button>
                </div>
            </form>
        </div>
    </body>
</html>
